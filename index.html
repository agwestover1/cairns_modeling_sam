<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ironman Cairns — Race Simulator (Sam)</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0e1117; color: #e6e6e6;
    }
    .card {
      max-width: 560px; padding: 40px; text-align: center;
    }
    h1 { font-size: 1.6rem; margin: 0 0 6px; }
    p.sub { color: #9aa4b2; margin: 0 0 28px; }
    .links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    a.btn {
      display: block; padding: 18px 26px; border-radius: 12px; text-decoration: none;
      background: #1b2230; color: #fff; border: 1px solid #2a3344; min-width: 180px;
      transition: background .15s, border-color .15s;
    }
    a.btn:hover { background: #232c3d; border-color: #3a4860; }
    a.btn .t { font-size: 1.1rem; font-weight: 600; }
    a.btn .d { font-size: .85rem; color: #9aa4b2; margin-top: 4px; }
    .note { margin-top: 28px; font-size: .8rem; color: #6b7585; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Ironman Cairns 2026 — Race Simulator</h1>
    <p class="sub">Course explorer, bike-split physics, and full-day projection for Sam.</p>
    <div class="links">
      <a class="btn" href="web/index.html">
        <div class="t">2D Map &amp; Simulator</div>
        <div class="d">Course, bike sim, full-day projection</div>
      </a>
      <a class="btn" href="web/3d.html">
        <div class="t">3D Course View</div>
        <div class="d">Terrain + live wind (needs Mapbox token)</div>
      </a>
    </div>
    <p class="note">Best viewed on a laptop. The 2D view has the full simulator + swim slider.</p>
  </div>
</body>
</html>
